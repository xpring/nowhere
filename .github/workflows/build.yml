- name: Generate keystore (run once, then remove this step)
        run: |
          keytool -genkeypair -v \
            -keystore app/gps_tracker.keystore \
            -alias gps_tracker \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass ctrlall \
            -keypass 517429Xp \
            -dname "CN=GPS Tracker,O=ctrlall,C=CN" \
            -noprompt
          base64 app/gps_tracker.keystore
          
name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: Fix gradlew
        run: |
          cat > gradlew << 'EOF'
          #!/usr/bin/env sh
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          APP_HOME="`dirname \"$0\"`"
          APP_HOME="`( cd \"$APP_HOME\" && pwd )`"
          CLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"
          exec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GPSTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
